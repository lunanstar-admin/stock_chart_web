name: daily-batch

on:
  schedule:
    # 월–금 16:00 KST = 07:00 UTC (장마감 15:30 직후)
    - cron: "0 7 * * 1-5"
  workflow_dispatch:
    inputs:
      limit:
        description: "처리할 종목 수 상한 (디버그용, 비워두면 전종목)"
        required: false
        default: ""
      workers:
        description: "병렬 워커 수"
        required: false
        default: "8"

permissions:
  contents: write

concurrency:
  group: daily-batch
  cancel-in-progress: false

jobs:
  batch:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run batch
        env:
          PYTHONUNBUFFERED: "1"
          TZ: Asia/Seoul
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          fi
          if [ -n "${{ github.event.inputs.workers }}" ]; then
            ARGS="$ARGS --workers ${{ github.event.inputs.workers }}"
          fi
          python -m batch.run_batch --output web/data $ARGS

      - name: Commit & push data + blog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 데이터 JSON + 블로그 원고/빌드 결과 + RSS + sitemap 모두 커밋
          git add web/data web/posts web/blog web/rss.xml web/sitemap.xml 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          DATE=$(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')
          git commit -m "chore(data): daily update + blog ${DATE}"
          # 동시 커밋 경합 대비 — rebase 충돌 시 배치 데이터 우선 merge 로 폴백
          for i in 1 2 3; do
            git fetch origin "${GITHUB_REF_NAME}"
            if git rebase "origin/${GITHUB_REF_NAME}"; then
              git push origin "HEAD:${GITHUB_REF_NAME}" && exit 0
            else
              echo "rebase conflict detected, falling back to merge -X ours..."
              git rebase --abort
              git merge -X ours "origin/${GITHUB_REF_NAME}" --no-edit && \
                git push origin "HEAD:${GITHUB_REF_NAME}" && exit 0
            fi
            echo "push retry $i..." && sleep 5
          done
          exit 1
