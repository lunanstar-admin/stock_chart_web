name: daily-batch

on:
  schedule:
    # 월–금 16:45 KST = 07:45 UTC (장마감 15:30 이후)
    - cron: "45 7 * * 1-5"
  workflow_dispatch:
    inputs:
      limit:
        description: "처리할 종목 수 상한 (디버그용, 비워두면 전종목)"
        required: false
        default: ""
      workers:
        description: "병렬 워커 수"
        required: false
        default: "8"

permissions:
  contents: write

concurrency:
  group: daily-batch
  cancel-in-progress: false

jobs:
  batch:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run batch
        env:
          PYTHONUNBUFFERED: "1"
          TZ: Asia/Seoul
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          fi
          if [ -n "${{ github.event.inputs.workers }}" ]; then
            ARGS="$ARGS --workers ${{ github.event.inputs.workers }}"
          fi
          python -m batch.run_batch --output web/data $ARGS

      - name: Commit & push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/data
          if git diff --staged --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          DATE=$(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')
          git commit -m "chore(data): daily update ${DATE}"
          # 동시 커밋 경합 대비 rebase 후 푸시
          for i in 1 2 3; do
            git pull --rebase origin "${GITHUB_REF_NAME}" && git push origin "HEAD:${GITHUB_REF_NAME}" && exit 0
            echo "push retry $i..." && sleep 5
          done
          exit 1
