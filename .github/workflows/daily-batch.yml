name: daily-batch

on:
  schedule:
    # GitHub Actions schedule 은 best-effort — 부하/장애 시 일부 fire 가 누락될 수 있음.
    # 동일 데이터 재수집은 idempotent 라서 이중으로 트리거해 안정성 확보.
    # 첫 fire 가 성공해 데이터가 commit 되어 있으면 두 번째 fire 는 "no changes" 로 즉시 종료.
    - cron: "40 6 * * 1-5"     # 1차: 15:40 KST (장마감 10분 후)
    - cron: "20 7 * * 1-5"     # 2차 백업: 16:20 KST (1차 누락 대비)
    - cron: "0 9 * * 1-5"      # 3차 안전망: 18:00 KST (앞 두 번 모두 누락 시)
  workflow_dispatch:
    inputs:
      limit:
        description: "처리할 종목 수 상한 (디버그용, 비워두면 전종목)"
        required: false
        default: ""
      workers:
        description: "병렬 워커 수"
        required: false
        default: "8"

permissions:
  contents: write

concurrency:
  group: daily-batch
  cancel-in-progress: false

jobs:
  batch:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 이중/삼중 cron 으로 fire 되었을 때, 이미 오늘자 데이터가 수집돼 있으면
      # 비싼 pip install / 데이터 수집 단계를 모두 건너뛴다.
      # workflow_dispatch 로 강제 실행한 경우에는 항상 진행.
      - name: Skip if today's data already collected
        id: freshness
        run: |
          SKIP="false"
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] && [ -f web/data/meta.json ]; then
            LAST=$(python3 -c "import json,sys; print(json.load(open('web/data/meta.json'))['updated'][:10])" 2>/dev/null || echo "")
            TODAY=$(TZ=Asia/Seoul date +'%Y-%m-%d')
            if [ "$LAST" = "$TODAY" ]; then
              echo "오늘($TODAY) 데이터 이미 수집됨. 이번 fire 는 스킵."
              SKIP="true"
            else
              echo "마지막 수집일=$LAST · 오늘=$TODAY · 진행."
            fi
          fi
          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.freshness.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        if: steps.freshness.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run batch
        if: steps.freshness.outputs.skip != 'true'
        env:
          PYTHONUNBUFFERED: "1"
          TZ: Asia/Seoul
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          fi
          if [ -n "${{ github.event.inputs.workers }}" ]; then
            ARGS="$ARGS --workers ${{ github.event.inputs.workers }}"
          fi
          python -m batch.run_batch --output web/data $ARGS

      - name: Commit & push data + blog
        if: steps.freshness.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 데이터 JSON + 블로그 원고/빌드 결과 + RSS + sitemap 모두 커밋
          git add web/data web/posts web/blog web/rss.xml web/sitemap.xml 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          DATE=$(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')
          git commit -m "chore(data): daily update + blog ${DATE}"
          # 동시 커밋 경합 대비 — rebase 충돌 시 배치 데이터 우선 merge 로 폴백
          for i in 1 2 3; do
            git fetch origin "${GITHUB_REF_NAME}"
            if git rebase "origin/${GITHUB_REF_NAME}"; then
              git push origin "HEAD:${GITHUB_REF_NAME}" && exit 0
            else
              echo "rebase conflict detected, falling back to merge -X ours..."
              git rebase --abort
              git merge -X ours "origin/${GITHUB_REF_NAME}" --no-edit && \
                git push origin "HEAD:${GITHUB_REF_NAME}" && exit 0
            fi
            echo "push retry $i..." && sleep 5
          done
          exit 1
