name: monthly-chaebol-collect

# 매월 첫째 토요일 09:00 KST = 00:00 UTC 에 가계도/관계도 데이터 갱신.
# GitHub Actions cron 이 "매월 첫 토요일" 을 직접 표현하지 못하므로
# 매주 토요일 트리거 + 단계 안에서 일자(1~7)를 체크해 첫 토요일만 진행.
on:
  schedule:
    - cron: "0 0 * * 6"   # 매주 토요일 00:00 UTC = 09:00 KST
  workflow_dispatch:
    inputs:
      force:
        description: "첫째 토요일 체크 우회 (디버그용)"
        required: false
        default: "false"
      pipeline_limit:
        description: "DART 호출 단계 종목 수 상한 (kospi200 기본)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: monthly-chaebol-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 매월 첫 토요일 게이트 — schedule 트리거일 때만 검사.
      # workflow_dispatch + force=true 면 게이트 우회.
      - name: First Saturday gate
        id: gate
        run: |
          DAY=$(TZ=Asia/Seoul date +'%d')
          MONTH=$(TZ=Asia/Seoul date +'%Y-%m')
          FORCE="${{ github.event.inputs.force }}"
          EVENT="${{ github.event_name }}"
          echo "오늘(KST): $(TZ=Asia/Seoul date +'%Y-%m-%d %A')  · day=$DAY"
          if [ "$EVENT" = "workflow_dispatch" ] && [ "$FORCE" = "true" ]; then
            echo "✓ workflow_dispatch + force=true → 진행"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT" = "workflow_dispatch" ]; then
            echo "✓ workflow_dispatch 수동 실행 → 진행"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          elif [ "$DAY" -le 7 ]; then
            echo "✓ 첫째 토요일 (KST $MONTH-$DAY) → 진행"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "✗ 둘째 이후 토요일 (day=$DAY) — 스킵"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        if: steps.gate.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install requests
          # 만약 collectors 가 추가 패키지를 요구하면 여기에 추가
          # pip install -r collectors/requirements.txt   # 필요 시

      - name: Run pipeline (collectors → JSON export)
        if: steps.gate.outputs.skip != 'true'
        env:
          PYTHONUNBUFFERED: "1"
          TZ: Asia/Seoul
          # DART API 키 — secrets.DART_API_KEY 가 없으면 base.py 의 fallback 사용
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          STOCK_DB: ${{ github.workspace }}/data/stock_db.sqlite
          CHAEBOL_MD: ${{ github.workspace }}/data_md/chaebol_family.md
          PIPELINE_LIMIT: ${{ github.event.inputs.pipeline_limit }}
        run: |
          mkdir -p data logs
          python -m batch.run_chaebol_pipeline

      - name: Commit & push JSON
        if: steps.gate.outputs.skip != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/data/chaebol.json web/data/chaebol-codes.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "변경 사항 없음."
            exit 0
          fi
          DATE=$(TZ=Asia/Seoul date +'%Y-%m-%d')
          git commit -m "chore(chaebol): 월간 데이터 갱신 ${DATE}"
          for i in 1 2 3; do
            git fetch origin "${GITHUB_REF_NAME}"
            if git rebase "origin/${GITHUB_REF_NAME}"; then
              git push origin "HEAD:${GITHUB_REF_NAME}" && exit 0
            else
              git rebase --abort
              git merge -X ours "origin/${GITHUB_REF_NAME}" --no-edit && \
                git push origin "HEAD:${GITHUB_REF_NAME}" && exit 0
            fi
            echo "push retry $i..." && sleep 5
          done
          exit 1
