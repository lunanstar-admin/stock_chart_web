<script>
let DATA = null;
let net = null;
let suggestDebounce = null;

async function init() {
  const stat = document.getElementById('stat');
  stat.textContent = '데이터 로딩 중...';
  const r = await fetch('/data/ownership.json?v=' + Date.now());
  DATA = await r.json();
  stat.textContent = `회사 ${DATA.count_companies}개 / 자회사 관계 ${DATA.count_subsidiaries}건`;
  // 디폴트: 삼성전자
  document.getElementById('qInput').value = '삼성전자 (005930)';
  loadGraph('005930');
}

function fmtCap(n) {
  if (!n) return '-';
  if (n >= 1e12) return (n/1e12).toFixed(2) + '조';
  if (n >= 1e8)  return Math.round(n/1e8).toLocaleString() + '억';
  return n.toLocaleString();
}

function onInput() {
  if (suggestDebounce) clearTimeout(suggestDebounce);
  suggestDebounce = setTimeout(showSuggest, 200);
}

function showSuggest() {
  const q = document.getElementById('qInput').value.trim();
  const sug = document.getElementById('suggest');
  if (!q || !DATA) { sug.style.display = 'none'; return; }
  if (/^\d{6}$/.test(q)) { sug.style.display = 'none'; loadGraph(q); return; }
  const ql = q.toLowerCase();
  const matches = DATA.companies.filter(c => c.name.toLowerCase().includes(ql) || c.code.startsWith(q)).slice(0, 20);
  if (!matches.length) {
    sug.innerHTML = '<div class="item" style="color:#94a3b8">검색 결과 없음</div>';
    sug.style.display = 'block';
    return;
  }
  sug.innerHTML = matches.map(m =>
    `<div class="item" onclick="pickSuggest('${m.code}', ${JSON.stringify(m.name)})">
        <strong>${m.name}</strong>
        <code style="color:#64748b;font-size:11px;margin-left:6px">${m.code}</code>
        <span style="float:right;font-size:10px;color:#64748b">${m.market}</span>
     </div>`
  ).join('');
  sug.style.display = 'block';
}

function pickSuggest(code, name) {
  document.getElementById('qInput').value = name + ' (' + code + ')';
  document.getElementById('suggest').style.display = 'none';
  loadGraph(code);
}

document.addEventListener('click', e => {
  const sug = document.getElementById('suggest');
  const inp = document.getElementById('qInput');
  if (sug && !sug.contains(e.target) && e.target !== inp) sug.style.display = 'none';
});

function buildSubGraph(centerCode, depth, minPct) {
  // BFS up/down from center
  const subsByParent = {};
  const subsBySub = {};
  DATA.subsidiaries.forEach(s => {
    if ((s.pct || 0) < minPct) return;
    (subsByParent[s.p] = subsByParent[s.p] || []).push(s);
    if (s.sc) (subsBySub[s.sc] = subsBySub[s.sc] || []).push(s);
  });
  const compByCode = {};
  DATA.companies.forEach(c => compByCode[c.code] = c);

  const nodes = {};
  const edges = [];
  const visited = new Set([centerCode]);
  const queue = [{ code: centerCode, d: 0 }];
  function addNode(code, name, listed) {
    if (nodes[code || name]) return;
    const c = code ? compByCode[code] : null;
    nodes[code || name] = {
      id: code || name,
      label: name,
      code: code,
      market: c ? c.market : null,
      cap: c ? c.cap : null,
      group: c ? c.group : null,
      listed: !!c,
    };
  }
  const start = compByCode[centerCode];
  if (!start) return null;
  addNode(centerCode, start.name);

  while (queue.length) {
    const { code, d } = queue.shift();
    if (d >= depth) continue;
    // children
    (subsByParent[code] || []).forEach(s => {
      const target = s.sc || s.sn;
      addNode(s.sc, s.sn);
      edges.push({ from: code, to: target, pct: s.pct, label: s.pct ? s.pct.toFixed(1)+'%' : '' });
      if (s.sc && !visited.has(s.sc)) { visited.add(s.sc); queue.push({ code: s.sc, d: d+1 }); }
    });
    // parents
    (subsBySub[code] || []).forEach(s => {
      addNode(s.p, s.pn);
      edges.push({ from: s.p, to: code, pct: s.pct, label: s.pct ? s.pct.toFixed(1)+'%' : '' });
      if (!visited.has(s.p)) { visited.add(s.p); queue.push({ code: s.p, d: d+1 }); }
    });
  }
  return { nodes: Object.values(nodes), edges, center: centerCode };
}

function loadGraph(forcedCode) {
  if (!DATA) return;
  let code = forcedCode;
  if (!code) {
    const q = document.getElementById('qInput').value.trim();
    const m = q.match(/\((\d{6})\)\s*$/);
    if (m) code = m[1];
    else if (/^\d{6}$/.test(q)) code = q;
    else {
      const found = DATA.companies.find(c => c.name === q);
      if (found) code = found.code;
    }
  }
  if (!code) return;
  const depth = parseInt(document.getElementById('depthSel').value);
  const minPct = parseFloat(document.getElementById('minPctSel').value);
  const g = buildSubGraph(code, depth, minPct);
  if (!g) {
    document.getElementById('stat').textContent = '회사를 찾을 수 없음';
    return;
  }
  document.getElementById('stat').textContent = `노드 ${g.nodes.length}개 / 관계 ${g.edges.length}건`;
  render(g);
}

function classify(n, edges, centerCode) {
  if (n.code === centerCode) return 'center';
  if (/지주|홀딩스|holdings/i.test(n.label)) return 'holding';
  const hasOut = edges.some(e => e.from === n.id);
  const hasIn = edges.some(e => e.to === n.id);
  if (hasOut && !hasIn) return 'parent';
  if (!hasOut && hasIn) return n.listed ? 'sub_listed' : 'sub_unlisted';
  return n.listed ? 'mid_listed' : 'mid_unlisted';
}

function render(data) {
  if (net) { net.destroy(); net = null; }
  const grpSet = [...new Set(data.nodes.map(n => n.group).filter(Boolean))];
  const palette = ['#0f172a','#f59e0b','#ec4899','#8b5cf6','#10b981','#3b82f6','#ef4444','#06b6d4','#84cc16','#f97316'];
  const grpBorder = {}; grpSet.forEach((g,i) => grpBorder[g] = palette[i % palette.length]);

  const metaMap = {};
  const visNodes = data.nodes.map(n => {
    const role = classify(n, data.edges, data.center);
    const isCenter = role === 'center', isHolding = role === 'holding';
    const isGroupHead = isCenter || isHolding;
    let size = 30;
    if (isCenter) size = 50;
    else if (isHolding) size = 44;
    else if (n.cap) size = Math.min(38, 28 + Math.log10(n.cap/1e9)*1.5);

    let bg, bc, fc, bw, shape;
    if (isCenter) { bg='#dc2626'; bc='#fbbf24'; fc='#fff'; bw=5; shape='circle'; }
    else if (isHolding) { bg='#f97316'; bc='#dc2626'; fc='#fff'; bw=4; shape='box'; }
    else if (n.listed) { bg='#fff'; bc=grpBorder[n.group]||'#475569'; fc='#0f172a'; bw=3; shape='circle'; }
    else { bg='#f1f5f9'; bc='#94a3b8'; fc='#475569'; bw=2; shape='box'; }

    const labelTxt = (n.label || '').length > 8 ? n.label.substring(0,8)+'…' : n.label;
    const sub = n.listed ? (n.cap ? fmtCap(n.cap) : '') : '비상장';
    const label = isGroupHead ? n.label : (sub ? `${labelTxt}\n${sub}` : labelTxt);

    metaMap[n.id] = n;
    return {
      id: n.id, label,
      title: `${n.label}${n.code ? ' ('+n.code+')':''}\n${({center:'중심',holding:'지주/홀딩스',parent:'모회사',sub_listed:'상장 자회사',mid_listed:'상장 중간',sub_unlisted:'비상장 자회사',mid_unlisted:'비상장 중간'})[role]}${n.market?'\n시장: '+n.market:''}${n.cap?'\n시총: '+fmtCap(n.cap):''}${n.group?'\n그룹: '+n.group:''}`,
      shape, size,
      color: { background: bg, border: bc, highlight:{background:'#fef3c7',border:'#f59e0b'}, hover:{background:'#fef3c7',border:'#f59e0b'} },
      borderWidth: bw,
      font: { color: fc, size: isCenter?14:(isHolding?13:11), face: 'sans-serif', bold: isGroupHead, multi:false },
      margin: 12,
      widthConstraint: shape === 'box' ? { minimum: 100, maximum: 160 } : undefined,
      shapeProperties: { borderDashes: (!n.listed && !isGroupHead) ? [5,4] : false },
    };
  });

  const visEdges = data.edges.map(e => {
    const pct = e.pct || 0;
    let color, w, dashes;
    if (pct >= 50) { color='#dc2626'; w=4; dashes=false; }
    else if (pct >= 20) { color='#ea580c'; w=3; dashes=false; }
    else if (pct >= 5) { color='#0d9488'; w=2; dashes=false; }
    else { color='#94a3b8'; w=1; dashes=[4,4]; }
    return {
      from: e.from, to: e.to,
      label: e.label,
      font: { size: 12, color: '#0f172a', strokeWidth:4, strokeColor:'#fff', face:'sans-serif', align:'middle', bold: pct>=50 },
      arrows: { to: { enabled:true, scaleFactor:0.7 } },
      width: w, dashes,
      color: { color, highlight:'#fbbf24' },
      smooth: { type:'cubicBezier', forceDirection:'none', roundness:0.4 },
    };
  });

  const opts = {
    physics: {
      enabled: true,
      stabilization: { enabled:true, iterations:500, fit:true, onlyDynamicEdges:false },
      barnesHut: { gravitationalConstant:-25000, centralGravity:0.1, springLength:280, springConstant:0.04, damping:0.5, avoidOverlap:1.0 },
      minVelocity: 1.0, timestep: 0.5,
    },
    layout: { improvedLayout:true, randomSeed:42 },
    interaction: { hover:true, tooltipDelay:200, dragNodes:true, zoomView:true },
  };

  net = new vis.Network(document.getElementById('graph'),
    { nodes: new vis.DataSet(visNodes), edges: new vis.DataSet(visEdges) }, opts);

  net.once('stabilizationIterationsDone', () => net.setOptions({ physics: false }));

  net.on('click', params => {
    if (!params.nodes.length) return;
    const meta = metaMap[params.nodes[0]];
    if (meta) showSide(meta);
  });
  net.on('doubleClick', params => {
    if (!params.nodes.length) return;
    const meta = metaMap[params.nodes[0]];
    if (meta && meta.code) window.location.href = '/chart?code=' + meta.code;
  });
}

function showSide(m) {
  document.getElementById('side').innerHTML = `
    <h4 style="margin:0 0 8px 0">${m.label}</h4>
    <div style="display:grid;gap:4px;font-size:12px;line-height:1.6">
      ${m.code ? `<div><strong>코드:</strong> <code>${m.code}</code></div>` : '<div style="color:#94a3b8">비상장 (코드 없음)</div>'}
      ${m.market ? `<div><strong>시장:</strong> ${m.market}</div>` : ''}
      ${m.cap ? `<div><strong>시가총액:</strong> ${fmtCap(m.cap)}</div>` : ''}
      ${m.group ? `<div><strong>그룹:</strong> ${m.group}</div>` : ''}
    </div>
    ${m.code ? `<div style="margin-top:10px;display:flex;gap:6px">
      <a href="/chart?code=${m.code}" style="flex:1;text-align:center;background:#3b82f6;color:#fff;padding:6px;border-radius:6px;text-decoration:none;font-size:11px;font-weight:600">📈 차트 보기</a>
      <a href="https://search.naver.com/search.naver?query=${encodeURIComponent(m.label)}" target="_blank" rel="noopener" style="flex:1;text-align:center;background:#03c75a;color:#fff;padding:6px;border-radius:6px;text-decoration:none;font-size:11px;font-weight:600">🔍 N 검색</a>
    </div>` : ''}
    <div style="margin-top:12px;color:#94a3b8;font-size:11px">💡 노드 더블클릭 → 차트 페이지<br>💡 드래그·휠로 이동/확대</div>
  `;
}

init();
</script>
