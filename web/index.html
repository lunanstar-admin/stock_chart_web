<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>차트 연구소 — KOSPI / KOSDAQ</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>

<header>
  <h1>차트 연구소</h1>
  <span class="subtitle">KOSPI / KOSDAQ · 전일 종가 기준</span>
  <span class="meta" id="metaInfo">로딩중...</span>
</header>

<div class="filter-bar">
  <select id="fMarket">
    <option value="ALL">전체</option>
    <option value="KOSPI">KOSPI</option>
    <option value="KOSDAQ">KOSDAQ</option>
  </select>
  <select id="fSort">
    <option value="marketCap">시가총액순</option>
    <option value="volume">거래량순</option>
    <option value="changeRate">등락률순</option>
  </select>
  <input id="fSearch" type="text" placeholder="종목명 / 코드 검색" autocomplete="off" />
  <span class="status" id="statusLabel"></span>
</div>

<main>
  <div class="cl-header">
    <div>종목</div>
    <div>차트 (최근 120일)</div>
    <div>수급 누적</div>
    <div>업종 · PER · 시총</div>
  </div>
  <div id="stockList">
    <div class="loading"><div class="spinner"></div></div>
  </div>
</main>

<footer>
  데이터 제공: FinanceDataReader · pykrx · Naver Finance &nbsp;|&nbsp;
  매일 장마감 후 1회 배치 업데이트
</footer>

<!-- 상세 모달 -->
<div class="modal-backdrop" id="detailModal" onclick="onBackdropClick(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2 id="detailTitle">종목명</h2>
      <code id="detailCode">000000</code>
      <button class="close" onclick="closeDetail()">닫기 (Esc)</button>
    </div>
    <div id="detailBody"></div>
  </div>
</div>

<script src="/assets/chart.js"></script>
<script src="/assets/app.js"></script>
</body>
</html>
